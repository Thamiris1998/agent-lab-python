<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="bingo-square relative flex items-center justify-center p-1 text-center rounded-lg transition-all duration-150 select-none min-h-[70px] text-xs leading-tight font-semibold
        {%- if square.is_marked %}
            {%- if is_winning %} bg-marked border-2 border-marked-border text-gray-900 shadow-xl
            {%- else %} bg-marked border-2 border-marked-border text-gray-900
            {%- endif %}
        {%- else %} bg-gray-100 text-gray-500 border-2 border-gray-300 hover:border-accent hover:shadow-lg
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm text-white bg-accent border-accent{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-white text-xs font-bold">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
